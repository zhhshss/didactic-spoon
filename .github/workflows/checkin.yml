# ============================================================
# mambo-hachimi 每日自动签到（GitHub Actions）
# ------------------------------------------------------------
# ⚠️ 使用前必读：
#   1) 到仓库 Settings → Secrets and variables → Actions → New secret
#      添加两个仓库机密：MAMBO_USERNAME / MAMBO_PASSWORD（你的账号密码）
#
#   2) 本站登录/签到都有 Cloudflare Turnstile 人机验证，而 README 已指出
#      「数据中心 IP 成功率低」——GitHub runner 正是机房 IP，故【需要登录时】
#      很可能过不了验证。强烈建议：先在本机用 headed 模式跑一次登录刷新
#      .profile/，让登录态被下方缓存复用；之后只要 auth_token 未过期，
#      Action 即可跳过最难的登录环节直接签到，成功率显著更高。
#
#   3) 脚本是幂等的：已签到会立即退出，重复运行安全无副作用。
# ============================================================
name: 每日自动签到

on:
  schedule:
    # 北京时间每天 09:07 触发（UTC 01:07）；刻意避开整点高峰，调度更准时
    - cron: '7 1 * * *'
  workflow_dispatch: {}   # 允许在 Actions 页面手动触发（用于首次测试）

# 同一时刻只允许一个签到任务，避免并发写坏 .profile 缓存
concurrency:
  group: mambo-checkin
  cancel-in-progress: false

# 仅需读取代码；不向仓库写入任何内容
permissions:
  contents: read

jobs:
  checkin:
    runs-on: ubuntu-latest   # 该镜像预装 Google Chrome，UC Mode 可直接使用
    timeout-minutes: 15      # 防止卡在人机验证上空耗 runner 时间

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 安装系统依赖（xvfb 虚拟显示 + UC 的 GUI 点击工具）
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb scrot python3-tk xdotool

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 恢复持久化浏览器 profile（登录态 / Cloudflare 通行证）
        uses: actions/cache/restore@v4
        with:
          path: .profile
          # run_id 唯一 → 精确键必然落空，靠 restore-keys 前缀命中最近一次缓存。
          # 这样配合下方 save 步骤可持续更新缓存（一体式固定键缓存不可变，无法刷新登录态）。
          key: mambo-profile-${{ github.run_id }}
          restore-keys: |
            mambo-profile-

      - name: 执行签到
        env:
          MAMBO_USERNAME: ${{ secrets.MAMBO_USERNAME }}
          MAMBO_PASSWORD: ${{ secrets.MAMBO_PASSWORD }}
          MAMBO_DISPLAY: xvfb   # 无桌面 runner：用虚拟显示，让 UC 仍可做 GUI 点击
        run: python checkin.py

      - name: 保存持久化浏览器 profile
        if: always()            # 即便签到失败也保存，尽量留住已刷新的登录态供下次复用
        uses: actions/cache/save@v4
        with:
          path: .profile
          key: mambo-profile-${{ github.run_id }}
