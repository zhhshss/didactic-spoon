# ============================================================
# mambo-hachimi 每日自动签到（GitHub Actions）
# ------------------------------------------------------------
# ⚠️ 使用前必读：
#   1) 到仓库 Settings → Secrets and variables → Actions → New secret
#      添加账号机密：MAMBO_USERNAME / MAMBO_PASSWORD（你的账号密码）
#
#   2) 登录态持久化（避免每次重新登录、避免反复收到登录提醒邮件）：
#      脚本会把登录令牌 auth_token 主动写入 .profile/.mambo_auth_token，
#      再由下方 actions/cache 跨运行复用。Chromium 的 localStorage 是异步落盘的，
#      仅靠浏览器缓存常 flush 不及时导致令牌丢失、被迫反复登录；改由脚本主动落盘后，
#      只要令牌未过期（站点 JWT 约 7 天）后续运行都【免登录】直接签到，
#      令牌自然过期才自动重登一次刷新。
#      （可选）想连首次登录都省掉：本机跑 `python checkin.py --export-token`
#      导出令牌，配成仓库机密『MAMBO_AUTH_TOKEN』即可。
#
#   3) 脚本是幂等的：已签到会立即退出，重复运行安全无副作用。
# ============================================================
name: 每日自动签到

on:
  schedule:
    # 北京时间每天 09:07 触发（UTC 01:07）；刻意避开整点高峰，调度更准时
    - cron: '7 1 * * *'
  workflow_dispatch: {}   # 允许在 Actions 页面手动触发（用于首次测试）

# 同一时刻只允许一个签到任务，避免并发写坏 .profile 缓存
concurrency:
  group: mambo-checkin
  cancel-in-progress: false

# 仅需读取代码；不向仓库写入任何内容
permissions:
  contents: read

jobs:
  checkin:
    runs-on: ubuntu-latest   # 该镜像预装 Google Chrome，UC Mode 可直接使用
    timeout-minutes: 15      # 防止卡在人机验证上空耗 runner 时间

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 安装系统依赖（xvfb 虚拟显示 + UC 的 GUI 点击工具）
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb scrot python3-tk xdotool

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 恢复持久化浏览器 profile（登录态 / Cloudflare 通行证）
        uses: actions/cache/restore@v4
        with:
          path: .profile
          # run_id 唯一 → 精确键必然落空，靠 restore-keys 前缀命中最近一次缓存。
          # 这样配合下方 save 步骤可持续更新缓存（一体式固定键缓存不可变，无法刷新登录态）。
          key: mambo-profile-${{ github.run_id }}
          restore-keys: |
            mambo-profile-

      - name: 执行签到
        env:
          MAMBO_USERNAME: ${{ secrets.MAMBO_USERNAME }}
          MAMBO_PASSWORD: ${{ secrets.MAMBO_PASSWORD }}
          MAMBO_AUTH_TOKEN: ${{ secrets.MAMBO_AUTH_TOKEN }}
          MAMBO_DISPLAY: xvfb
        # 【重点修正】：使用 xvfb-run 动态分配虚拟屏幕并执行脚本
        run: xvfb-run --auto-servernum python checkin.py

      - name: 保存持久化浏览器 profile
        if: always()            # 即便签到失败也保存，尽量留住已刷新的登录态供下次复用
        uses: actions/cache/save@v4
        with:
          path: .profile
          key: mambo-profile-${{ github.run_id }}
